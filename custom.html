<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Your Own Design | AJDidThese</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial,sans-serif;
padding:40px 20px;
}

.container{
max-width:900px;
margin:auto;
background:#111;
padding:35px;
border-radius:20px;
border:2px solid #ff0000;
}

label{
display:block;
margin-top:15px;
color:gold;
font-weight:bold;
}

input,
select,
textarea{
width:100%;
padding:12px;
margin-top:5px;
border:none;
border-radius:10px;
background:#222;
color:white;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:red;
color:white;
border:none;
border-radius:12px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🎨 Request Your Own Design</h1>

<form>
<label>Full Name</label>
<input type="text">

<label>Email Address</label>
<input type="email">

<label>Contact Number</label>
<input type="tel">

<label>Location</label>
<input type="text">

<label>Shoe Model & Size</label>
<input type="text">

<label>Will You Provide The Base Shoes?</label>
<select>
<option>Yes</option>
<option>No</option>
</select>

<label>Condition of Shoes</label>
<select>
<option>Brand New</option>
<option>Used</option>
</select>

<label>Colorway</label>
<input type="text">

<label>Customization Idea (Describe Your Concept)</label>
<textarea></textarea>

<label>Preferred Colors & Theme</label>
<textarea></textarea>

<label>Budget (Optional)</label>
<input type="text">
<label>Deadline / Urgency</label>
<input type="text">

<label>Additional Notes</label>
<textarea></textarea>

<label>Would You Like Us To Call You After We Receive Your Inquiry?</label>
<select>
<option>Yes</option>
<option>No</option>
</select>

<button type="submit">
Submit Design Request
</button>

</form>

<a href="index.html">
⬅ Back To Store
</a>

</div>

<script>

async function sendCustomRequest(){

const payload = {
content: "New custom design request submitted."
};

await fetch("https://discord.com/api/webhooks/1514718583001714800/s5ngxaG0QcJG0HijXtUkIf6rVpqHNLq066_JgXymQBDcRkt7CzPTh1AyprueqcX15AnB",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(payload)
});

alert("Request submitted!");

}

document.querySelector("form").addEventListener("submit", function(e){
e.preventDefault();
sendCustomRequest();
});

</script>

</body>
</html>
